<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=cd praticas/aluno-online-vanilla, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <main>
        <header>
            <img src="/learn.svg" alt="Logo de Aprendizado">
            <h1>Aluno Online</h1>
        </header>
        <form action="form-login">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email">
            <p id="emailErro"></p>
            <label for="password">Senha</label>
            <input type="password" id="senha" name="senha">
            <p id="senhaErro"></p>
            <button type="submit" >Entrar</button>
        </form>
    </main>
    <footer>
        <p>&copy 2026. Todos os direitos Reservados</p>
    </footer>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
